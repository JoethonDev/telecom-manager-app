{% extends "base.html" %}
{% block title %}Error — Telecom Manager{% endblock %}
{% block page_heading %}Something went wrong{% endblock %}
{% block body_content %}
<section class="panel-card narrow-card error-panel">
  <span class="soft-badge danger">Error</span>
  <h2>Request failed</h2>
  <p>{{ message }}</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Back to Dashboard</a>
</section>
{% endblock %}
