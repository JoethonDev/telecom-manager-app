{% extends "base.html" %}
{% block title %}Settings — Telecom Manager{% endblock %}
{% block page_heading %}Settings{% endblock %}
{% block body_content %}
<form method="post" class="form-sections">
  <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
  <section class="panel-card narrow-card">
    <div class="section-head"><div><span class="eyebrow">Connection metadata</span><h2>Public connection values</h2></div></div>
    <div class="form-stack wide-form">
      <label>Connection domain <input name="connection_domain" value="{{ settings.connection_domain }}" placeholder="vpn.example.com"></label>
      <label>Public IP <input name="public_ip" value="{{ settings.public_ip }}" placeholder="203.0.113.10"></label>
    </div>
  </section>
  <section class="panel-card narrow-card">
    <div class="section-head"><div><span class="eyebrow">Service ports</span><h2>Port configuration</h2></div></div>
    <div class="form-stack wide-form">
      <label>SSH TLS (STunnel) <input name="stunnel_port" value="{{ settings.stunnel_port }}" placeholder="443" type="number" min="1" max="65535"></label>
      <label>VMess TCP TLS <input name="vmess_port" value="{{ settings.vmess_port }}" placeholder="2053" type="number" min="1" max="65535"></label>
      <label>VLESS TCP TLS Vision <input name="vless_port" value="{{ settings.vless_port }}" placeholder="8443" type="number" min="1" max="65535"></label>
      <label>SSH Compat <input name="ssh_compat_port" value="{{ settings.ssh_compat_port }}" placeholder="2222" type="number" min="1" max="65535"></label>
    </div>
  </section>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save settings</button>
  </div>
</form>
{% endblock %}
